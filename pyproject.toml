[project]
name = "mcp-experiments"
version = "0.1.0"
description = "Weekend project exploring MCP with vector DB, Slack, ClickUp, and email integrations"
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.0.0",
    "chromadb>=1.5.0",
    "httpx>=0.28.0",
    "python-dotenv>=1.0.0",
]

[project.scripts]
mcp-experiments = "mcp_experiments.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
